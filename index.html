<!DOCTYPE html>
<html>
<head>
  <title>Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3ec;
      color: #202124;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    h1 {
      margin: 0 0 22px;
      color: #17633a;
      font-size: 32px;
      text-align: center;
    }

    #menu {
      display: grid;
      gap: 12px;
    }

    .menu-item {
      padding: 16px 18px;
      border: 1px solid #e1d8ca;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(32, 33, 36, 0.08);
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .menu-item:hover,
    .menu-item.active {
      border-color: #17633a;
      box-shadow: 0 3px 12px rgba(23, 99, 58, 0.16);
    }

    .item-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .item-name {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .item-price {
      font-size: 20px;
      font-weight: 700;
      color: #b64b20;
      white-space: nowrap;
    }

    .weight-panel {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #eee4d7;
    }

    .menu-item.active .weight-panel {
      display: grid;
      gap: 10px;
    }

    .weight-panel label {
      font-size: 14px;
      font-weight: 700;
      color: #4a4d50;
    }

    .calc-field {
      display: grid;
      gap: 6px;
    }

    .calc-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d5c9b8;
      border-radius: 6px;
      font-size: 18px;
      outline: none;
    }

    .calc-input:focus {
      border-color: #17633a;
      box-shadow: 0 0 0 3px rgba(23, 99, 58, 0.12);
    }

    .calculated-result {
      min-height: 24px;
      color: #17633a;
      font-size: 18px;
      font-weight: 700;
    }

    .message {
      padding: 16px;
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>GFM Menu</h1>
    <div id="menu" class="message">Loading menu...</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collectionGroup, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbzeNkTSsNaC5Yhb5oUy86W2uURK_K7Rk",
      authDomain: "gfm-menu.firebaseapp.com",
      projectId: "gfm-menu"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const menuDiv = document.getElementById("menu");

    function parsePrice(price) {
      const numericPrice = Number(String(price).replace(/[^0-9.]/g, ""));
      return Number.isFinite(numericPrice) ? numericPrice : 0;
    }

    function calculateWeightPrice(price, grams) {
      return (price * grams) / 1000;
    }

    function calculateGrams(price, rupees) {
      return (rupees * 1000) / price;
    }

    function formatRupees(price) {
      return `Rs. ${price.toFixed(2)}`;
    }

    function formatGrams(grams) {
      return `${grams.toFixed(0)} gm`;
    }

    function openWeightPanel(item, input) {
      document.querySelectorAll(".menu-item.active").forEach((activeItem) => {
        if (activeItem !== item) {
          activeItem.classList.remove("active");
        }
      });

      item.classList.add("active");
      input.focus();
    }

    function addMenuItem(name, price) {
      const numericPrice = parsePrice(price);
      const div = document.createElement("div");
      div.className = "menu-item";
      div.tabIndex = 0;

      const summary = document.createElement("div");
      summary.className = "item-summary";

      const itemName = document.createElement("p");
      itemName.className = "item-name";
      itemName.textContent = name;

      const itemPrice = document.createElement("span");
      itemPrice.className = "item-price";
      itemPrice.textContent = `Rs. ${price}`;

      summary.appendChild(itemName);
      summary.appendChild(itemPrice);

      const weightPanel = document.createElement("div");
      weightPanel.className = "weight-panel";

      const gramField = document.createElement("div");
      gramField.className = "calc-field";

      const gramLabel = document.createElement("label");
      gramLabel.textContent = "Enter gm";

      const gramInput = document.createElement("input");
      gramInput.className = "calc-input";
      gramInput.type = "number";
      gramInput.min = "1";
      gramInput.step = "1";
      gramInput.inputMode = "decimal";
      gramInput.placeholder = "Example: 250";
      gramInput.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      const calculatedPrice = document.createElement("div");
      calculatedPrice.className = "calculated-result";

      gramInput.addEventListener("input", () => {
        const grams = Number(gramInput.value);

        if (!Number.isFinite(grams) || grams <= 0) {
          calculatedPrice.textContent = "";
          return;
        }

        calculatedPrice.textContent = `Price for ${grams} gm: ${formatRupees(calculateWeightPrice(numericPrice, grams))}`;
      });

      gramField.appendChild(gramLabel);
      gramField.appendChild(gramInput);
      gramField.appendChild(calculatedPrice);

      const priceField = document.createElement("div");
      priceField.className = "calc-field";

      const priceLabel = document.createElement("label");
      priceLabel.textContent = "Enter price";

      const priceInput = document.createElement("input");
      priceInput.className = "calc-input";
      priceInput.type = "number";
      priceInput.min = "1";
      priceInput.step = "1";
      priceInput.inputMode = "decimal";
      priceInput.placeholder = "Example: 100";
      priceInput.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      const calculatedGrams = document.createElement("div");
      calculatedGrams.className = "calculated-result";

      priceInput.addEventListener("input", () => {
        const rupees = Number(priceInput.value);

        if (!Number.isFinite(rupees) || rupees <= 0 || numericPrice <= 0) {
          calculatedGrams.textContent = "";
          return;
        }

        calculatedGrams.textContent = `Gram for ${formatRupees(rupees)}: ${formatGrams(calculateGrams(numericPrice, rupees))}`;
      });

      priceField.appendChild(priceLabel);
      priceField.appendChild(priceInput);
      priceField.appendChild(calculatedGrams);

      weightPanel.appendChild(gramField);
      weightPanel.appendChild(priceField);

      div.appendChild(summary);
      div.appendChild(weightPanel);

      div.addEventListener("click", () => {
        openWeightPanel(div, gramInput);
      });

      div.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openWeightPanel(div, gramInput);
        }
      });

      menuDiv.appendChild(div);
    }

    function renderMenu(snapshot) {
      menuDiv.classList.remove("message");
      menuDiv.innerHTML = "";

      snapshot.forEach((doc) => {
        const menuItems = doc.data();

        Object.entries(menuItems).forEach(([name, price]) => {
          if (price !== null && price !== undefined && price !== "") {
            addMenuItem(name, price);
          }
        });
      });

      if (!menuDiv.children.length) {
        menuDiv.classList.add("message");
        menuDiv.textContent = "No menu items found.";
      }
    }

    function showError(error) {
      console.error("Error loading menu:", error);
      menuDiv.classList.add("message");
      menuDiv.textContent = "Could not load menu. Please check Firestore rules and collection name.";
    }

    onSnapshot(collectionGroup(db, "gokul"), renderMenu, showError);
  </script>
</body>
</html>
