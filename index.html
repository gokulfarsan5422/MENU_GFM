<!DOCTYPE html>
<html>
<head>
  <title>Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3ec;
      color: #202124;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    h1 {
      margin: 0 0 22px;
      color: #17633a;
      font-size: 32px;
      text-align: center;
    }

    #menu {
      display: grid;
      gap: 12px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid #e1d8ca;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(32, 33, 36, 0.08);
    }

    .item-name {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .item-price {
      font-size: 20px;
      font-weight: 700;
      color: #b64b20;
      white-space: nowrap;
    }

    .message {
      padding: 16px;
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>GFM Menu</h1>
    <div id="menu" class="message">Loading menu...</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collectionGroup, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbzeNkTSsNaC5Yhb5oUy86W2uURK_K7Rk",
      authDomain: "gfm-menu.firebaseapp.com",
      projectId: "gfm-menu"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const menuDiv = document.getElementById("menu");

    function addMenuItem(name, price) {
      const div = document.createElement("div");
      div.className = "menu-item";

      const itemName = document.createElement("p");
      itemName.className = "item-name";
      itemName.textContent = name;

      const itemPrice = document.createElement("span");
      itemPrice.className = "item-price";
      itemPrice.textContent = `Rs. ${price}`;

      div.appendChild(itemName);
      div.appendChild(itemPrice);

      menuDiv.appendChild(div);
    }

    function renderMenu(snapshot) {
      menuDiv.classList.remove("message");
      menuDiv.innerHTML = "";

      snapshot.forEach((doc) => {
        const menuItems = doc.data();

        Object.entries(menuItems).forEach(([name, price]) => {
          if (price !== null && price !== undefined && price !== "") {
            addMenuItem(name, price);
          }
        });
      });

      if (!menuDiv.children.length) {
        menuDiv.classList.add("message");
        menuDiv.textContent = "No menu items found.";
      }
    }

    function showError(error) {
      console.error("Error loading menu:", error);
      menuDiv.classList.add("message");
      menuDiv.textContent = "Could not load menu. Please check Firestore rules and collection name.";
    }

    onSnapshot(collectionGroup(db, "gokul"), renderMenu, showError);
  </script>
</body>
</html>
